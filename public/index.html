<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Мои задачи</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 600px;
      margin: 40px auto;
      padding: 0 20px;
      background: #f5f5f5;
    }

    h1 {
      color: #333;
    }

    .add-form {
      background: white;
      padding: 16px;
      border: 1px solid #ddd;
      border-radius: 6px;
      margin-bottom: 20px;
    }

    .add-form input {
      width: 100%;
      padding: 8px;
      font-size: 14px;
      border: 1px solid #ccc;
      border-radius: 4px;
      box-sizing: border-box;
      margin-bottom: 8px;
    }

    .add-form select {
      padding: 8px;
      font-size: 14px;
      border: 1px solid #ccc;
      border-radius: 4px;
      margin-right: 8px;
    }

    .add-form button {
      padding: 8px 16px;
      background: #4a90e2;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }

    .add-form button:hover {
      background: #357abd;
    }

    .filters {
      margin-bottom: 12px;
    }

    .filters button {
      padding: 6px 12px;
      margin-right: 6px;
      border: 1px solid #ccc;
      background: white;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
    }

    .filters button.active {
      background: #4a90e2;
      color: white;
      border-color: #4a90e2;
    }

    .task-list {
      background: white;
      border: 1px solid #ddd;
      border-radius: 6px;
      overflow: hidden;
    }

    .task {
      display: flex;
      align-items: center;
      padding: 12px 16px;
      border-bottom: 1px solid #eee;
      gap: 10px;
    }

    .task:last-child {
      border-bottom: none;
    }

    .task input[type="checkbox"] {
      width: 16px;
      height: 16px;
      cursor: pointer;
    }

    .task-title {
      flex: 1;
      font-size: 14px;
      color: #333;
    }

    .task.done .task-title {
      text-decoration: line-through;
      color: #999;
    }

    .priority {
      font-size: 12px;
      padding: 2px 8px;
      border-radius: 3px;
    }

    .priority.high   { background: #fde8e8; color: #c0392b; }
    .priority.medium { background: #fef9e7; color: #d68910; }
    .priority.low    { background: #e9f7ef; color: #27ae60; }

    .delete-btn {
      background: none;
      border: none;
      color: #999;
      cursor: pointer;
      font-size: 16px;
      padding: 2px 6px;
    }

    .delete-btn:hover {
      color: #e74c3c;
    }

    .stats {
      font-size: 13px;
      color: #666;
      margin-bottom: 12px;
    }

    .empty {
      padding: 24px;
      text-align: center;
      color: #999;
      font-size: 14px;
    }
  </style>
</head>
<body>

  <h1>Мои задачи</h1>

  <div class="add-form">
    <input type="text" id="new-title" placeholder="Что нужно сделать?" />
    <div>
      <select id="new-priority">
        <option value="high">Срочно</option>
        <option value="medium" selected>Обычно</option>
        <option value="low">Не срочно</option>
      </select>
      <button onclick="addTask()">Добавить</button>
    </div>
  </div>

  <div class="stats" id="stats">Загрузка...</div>

  <div class="filters">
    <button class="active" onclick="setFilter('all', this)">Все</button>
    <button onclick="setFilter('pending', this)">В работе</button>
    <button onclick="setFilter('done', this)">Готово</button>
  </div>

  <div class="task-list" id="task-list">
    <div class="empty">Загрузка...</div>
  </div>

  <script>
    let currentFilter = 'all';

    // получаем задачи с сервера
    async function loadTasks() {
      let url = '/api/tasks';
      if (currentFilter === 'pending') url += '?done=false';
      if (currentFilter === 'done')    url += '?done=true';

      const res = await fetch(url);
      const data = await res.json();

      renderTasks(data.data);
      loadStats();
    }

    async function loadStats() {
      const res = await fetch('/api/tasks/stats');
      const data = await res.json();
      const s = data.data;
      document.getElementById('stats').textContent =
        `Всего: ${s.total}  /  Выполнено: ${s.done}  /  В работе: ${s.pending}`;
    }

    function renderTasks(tasks) {
      const list = document.getElementById('task-list');

      if (tasks.length === 0) {
        list.innerHTML = '<div class="empty">Задач нет</div>';
        return;
      }

      // .map() — лямбда применяется к каждой задаче, возвращает HTML-строку
      list.innerHTML = tasks.map(task => `
        <div class="task ${task.done ? 'done' : ''}">
          <input type="checkbox" ${task.done ? 'checked' : ''}
            onchange="toggleTask('${task.id}', ${task.done})" />
          <span class="task-title">${task.title}</span>
          <span class="priority ${task.priority}">${
            task.priority === 'high'   ? 'Срочно'    :
            task.priority === 'medium' ? 'Обычно'    : 'Не срочно'
          }</span>
          <button class="delete-btn" onclick="deleteTask('${task.id}')">x</button>
        </div>
      `).join('');
    }

    async function addTask() {
      const titleInput = document.getElementById('new-title');
      const priority   = document.getElementById('new-priority').value;
      const title      = titleInput.value.trim();

      if (!title) {
        titleInput.focus();
        return;
      }

      await fetch('/api/tasks', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title, priority })
      });

      titleInput.value = '';
      loadTasks();
    }

    async function toggleTask(id, currentDone) {
      await fetch(`/api/tasks/${id}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ done: !currentDone })
      });
      loadTasks();
    }

    async function deleteTask(id) {
      await fetch(`/api/tasks/${id}`, { method: 'DELETE' });
      loadTasks();
    }

    function setFilter(filter, btn) {
      document.querySelectorAll('.filters button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentFilter = filter;
      loadTasks();
    }

    // Enter чтобы добавить задачу
    document.getElementById('new-title').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') addTask();
    });

    loadTasks();
  </script>

</body>
</html>
